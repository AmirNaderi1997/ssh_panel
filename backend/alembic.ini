# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, to prepend to sys.path
prepend_syspath = .

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to allow in filename
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# which is useful for custom templates
# relative_imports = false

# version locations - support multiple version directories
# version_locations = %(here)s/alembic/versions

# version path separator; defaults to ';'
# version_path_separator = ;

# set to 'true' to search for migrations recursively
# recursive_version_locations = false

# logging configuration section
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
