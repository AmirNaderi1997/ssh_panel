version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ssh_manager_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ssh_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ssh_manager_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: ssh_manager_backend
    restart: always
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ssh_manager}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkeychangeinproduction1234567890}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32bytekeyforfernetencryption_mustbe32bytes=}
      - AGENT_SHARED_SECRET=${AGENT_SHARED_SECRET:-agentsharedsecretforauthandencryption}

  celery_worker:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: ssh_manager_celery_worker
    restart: always
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info -E
    depends_on:
      - db
      - redis
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ssh_manager}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkeychangeinproduction1234567890}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32bytekeyforfernetencryption_mustbe32bytes=}

  celery_beat:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: ssh_manager_celery_beat
    restart: always
    command: celery -A backend.app.tasks.celery_app beat --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ssh_manager}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkeychangeinproduction1234567890}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32bytekeyforfernetencryption_mustbe32bytes=}

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ssh_manager_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
